<!DOCTYPE html>
<html>
<head>
  <title>Happy 1024 Programmer's Day!</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: #000000;  
    }

    h1 {
      padding: 20px;
      animation: titleAnimation 1s infinite alternate;
    }

    @keyframes titleAnimation {
      0% {
        color: #ff0000;
        transform: translateX(-10px);
      }
      100% {
        color: #00ff00;
        transform: translateX(10px);  
      }
    }

    #logo {
      font-size: 100px;
      margin-top: 50px;
    }

    #animation-container {
      position: relative;
      margin-top: 30px;
      color: #ffffff;
    }

    #animation {
      font-size: 40px;
      position: absolute;
      left: 0;
      top: 50%;
      transform: translate(0, -50%);
      background-image: linear-gradient(45deg, #ff0000, #00ff00, #0000ff, #ff00ff, #ffff00, #00ffff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: colorAnimation 5s infinite;
    }

    @keyframes colorAnimation {
      0% {
        background-position: 0% 50%;
      }
      100% {
        background-position: 100% 50%;
      }
    }

    #monster {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      content: "########\n#      #\n# O  O #\n#   ~  #\n########";
      font-family: monospace;
      white-space: pre;
      line-height: 1.2; 
      margin-top: 70px;
    }

    #smiley {
      position: absolute;
      left: 20px;
      top: 50%;
      transform: translate(0, -50%);
      font-size: 40px;
      color: #ffffff;
      line-height: 1.2;
    }
  </style>

</head>

<body>

  <h1>Happy 1024 Programmer's Day!</h1>

  <div id="logo">10.24</div>

  <div id="animation-container">
    <div id="animation">Happy Programmer's Day!</div>
    <pre id="monster"></pre>
    <div id="smiley">
      M&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;M<br>
      M&nbsp;M&nbsp;M<br>
      M&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;M<br>
    </div>
  </div>

</body>
</html>
